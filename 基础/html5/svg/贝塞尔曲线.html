<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    #wrap {
      width: 500px;
      height: 500px;
      border: 2px solid #000;
    }
  </style>
</head>

<body>
  <div id="wrap">
    <svg xmlns="http://www.w3.org/2000/svg" width='100%' height='100%'>
      <!-- 
        M：开始点x，y
        S：平滑贝塞尔曲线(自动对称一个控制点) (x2,y2,x,y) x2,y2控制点 x,y结束点 
      -->
      <path d="M0 0 S0 400 300 400" style="stroke:red;stroke-width:1;fill:pink;"></path>
    </svg>
  </div>
</body>

</html>
