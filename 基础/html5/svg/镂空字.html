<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
  <style>
    html,
    body {
      background-color: rgb(251, 102, 0);
      height: 100%;
      padding: 0;
      margin: 0;
      overflow: hidden;
    }

    .svg-mask {
      mask: url(#svg-mask);
    }
  </style>
</head>

<body>
  <svg width="100%" height="100%">
    <defs>
      <mask id="svg-mask">
        <rect width="100%" height="100%" fill="#fff"></rect>
        <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" style="font-size: 130px;">iPhone XS</text>
      </mask>
    </defs>
    <rect class="svg-mask" width="100%" height="100%" fill="#fff"></rect>
  </svg>
  <script>

  </script>
</body>

</html>
