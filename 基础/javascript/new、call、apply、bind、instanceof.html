<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    // 手写 new
    function _new(Ctor, ...args) {
      if (typeof Ctor !== 'function') {
        throw 'Ctor 必须是 function'
      }
      var obj = {}
      obj.__proto__ = Object.create(Ctor.prototype)
      var res = Ctor.call(obj, ...args)

      return res instanceof Object ? res : obj
    }
    
    // 手写 call
    Function.prototype._call = function(cxt) {
      if (typeof this !== 'function') throw new TypeError('Error')
      var context = cxt || window
      context.fn = this // 更换上下文
      const args = [...arguments].slice(1)
      const result = context.fn(...args)
      delete context.fn
      return result
    }

    // 手写 apply
    Function.prototype._apply = function(cxt) {
      if (typeof this !== 'function') throw new TypeError('Error')
      var context = cxt || window
      context.fn = this
      // 处理参数和 call 有区别，因为 apply 参数2为数组
      var result = arguments[1] ? context.fn(...arguments[1]) : context.fn()
      delete context.fn
      return result
    }

    // 手写 bind
    Function.prototype._bind = function (cxt) {
      if (typeof this !== 'function') throw new TypeError('Error')
      const self = this
      const args = [...arguments].slice(1)

      return function F() {
        // 针对返回的函数作为类实例化（new F()）时，返回一个实例化函数形式的调用
        if (this instanceof F) return new self(...args, ...arguments)
        return self.apply(cxt, args.concat(...arguments))
      }
    }

    // 手写 instanceof
    function _instanceof(obj, fn) {
      var prototype = fn.prototype
      left = obj.__proto__
      while (true) {
        if (left === null || left === undefined)
          return false
        if (prototype === left)
          return true
        left = left.__proto__
      }
    }
  </script>
</body>
</html>
