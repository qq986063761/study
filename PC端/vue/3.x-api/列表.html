<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
	</style>
</head>
<body>
  <div id="app">
    <div :ref="setRef" v-for="(item, index) in arr">{{ index }}: {{ item }}</div>
  </div>
  <script src="https://unpkg.com/vue@next"></script>
  <script>
    const { createApp } = Vue

    const app = createApp({
      data() {
        return {
          arr: [1, 2, 3],
          refs: []
        }
      },
      methods: {
        // 列表的 ref 需要自己配置
        setRef(data) {
          this.refs.push(data)
          console.log('setRef', data)
        }
      },
      mounted() {
        console.log('refs', this.refs)
      }
    })
   
    app.mount('#app')
  </script>
</body>
</html>
