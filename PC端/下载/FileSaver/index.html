    var doc = 'https://zxb-online.topscrm.cn/文档_ad4fafbb-48ab-4d14-92bb-2c7385bc84c9.doc'
    var ppt = 'https://zxb-online.topscrm.cn/演示_614fc625-e555-43be-9cb3-e0a90dca241b.ppt'

    var arr = [doc, ppt, xls, img, pdf]

    var downloadEls = document.getElementsByClassName('download')
    for (var index = 0; index < downloadEls.length; index++) {
      var element = downloadEls[index]
      element.onclick = (function (i) {
        return function() {
          var url = arr[i]
          var dotIdx = url.lastIndexOf('.')
          saveAs(url, '自定义文件名' + url.slice(dotIdx))
        }
      })(index)
    }
  </script>
