services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment:
      TASK_BACKEND: celery
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./output:/app/output
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A celery_app:celery_app worker --loglevel=info --pool=solo
    environment:
      TASK_BACKEND: celery
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./output:/app/output
    depends_on:
      redis:
        condition: service_healthy
