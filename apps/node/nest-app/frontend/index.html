<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nest MySQL Users Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
    <style>
      body {
        background: #f4f2ee;
      }

      [v-cloak] {
        display: none;
      }
    </style>
  </head>
  <body class="min-h-screen text-stone-950">
    <div id="app" v-cloak class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
      <header class="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
        <div>
          <p class="text-sm font-semibold text-emerald-700">NestJS + MySQL</p>
          <h1 class="mt-2 text-3xl font-bold tracking-tight">用户 CRUD 演示</h1>
          <p class="mt-3 max-w-2xl text-base leading-7 text-stone-600">
            前端使用 Vue 3、axios、Tailwind CSS 和 Element Plus CDN，后端使用 NestJS 连接 MySQL 的 users.users 表。
          </p>
        </div>

        <el-button type="primary" size="large" @click="openCreateDialog">新增用户</el-button>
      </header>

      <main class="mt-6 rounded-lg border border-stone-200 bg-white shadow-sm">
        <section class="flex flex-col gap-3 border-b border-stone-200 p-5 md:flex-row md:items-center">
          <el-input
            v-model="keyword"
            size="large"
            clearable
            placeholder="搜索 ID、用户名、邮箱、年龄或状态"
            class="md:max-w-xl"
            @keyup.enter="fetchUsers"
            @clear="fetchUsers"
          ></el-input>
          <div class="flex gap-2">
            <el-button type="primary" size="large" @click="fetchUsers">搜索</el-button>
            <el-button size="large" @click="clearSearch">清空</el-button>
          </div>
        </section>

        <el-table v-loading="loading" :data="users" stripe class="w-full">
          <el-table-column prop="id" label="ID" width="90"></el-table-column>
          <el-table-column prop="username" label="用户名" min-width="140"></el-table-column>
          <el-table-column prop="email" label="邮箱" min-width="220"></el-table-column>
          <el-table-column prop="age" label="年龄" width="100"></el-table-column>
          <el-table-column label="状态" width="110">
            <template #default="{ row }">
              <el-tag :type="row.status === 1 ? 'success' : 'info'">
                {{ row.status === 1 ? '启用' : '停用' }}
              </el-tag>
            </template>
          </el-table-column>
          <el-table-column label="创建时间" min-width="190">
            <template #default="{ row }">{{ formatDate(row.created_at) }}</template>
          </el-table-column>
          <el-table-column label="操作" width="180" fixed="right">
            <template #default="{ row }">
              <el-button size="small" @click="openEditDialog(row)">编辑</el-button>
              <el-button size="small" type="danger" @click="deleteUser(row)">删除</el-button>
            </template>
          </el-table-column>
        </el-table>

        <footer class="flex items-center justify-between border-t border-stone-200 px-5 py-4 text-sm text-stone-500">
          <span>共 {{ users.length }} 条</span>
          <span v-if="lastMessage" class="text-stone-700">{{ lastMessage }}</span>
        </footer>
      </main>

      <el-dialog v-model="dialogVisible" :title="editingId ? '编辑用户' : '新增用户'" width="460px">
        <el-form ref="formRef" :model="form" :rules="rules" label-width="84px">
          <el-form-item label="用户名" prop="username">
            <el-input v-model.trim="form.username" placeholder="例如：李四"></el-input>
          </el-form-item>
          <el-form-item label="邮箱" prop="email">
            <el-input v-model.trim="form.email" placeholder="name@example.com"></el-input>
          </el-form-item>
          <el-form-item label="年龄" prop="age">
            <el-input-number v-model="form.age" :min="0" :max="150" class="w-full"></el-input-number>
          </el-form-item>
          <el-form-item label="状态" prop="status">
            <el-select v-model="form.status" class="w-full">
              <el-option label="启用" :value="1"></el-option>
              <el-option label="停用" :value="0"></el-option>
            </el-select>
          </el-form-item>
        </el-form>

        <template #footer>
          <div class="flex justify-end gap-2">
            <el-button @click="closeDialog">取消</el-button>
            <el-button type="primary" :loading="saving" @click="submitUser">
              {{ editingId ? '保存修改' : '新增用户' }}
            </el-button>
          </div>
        </template>
      </el-dialog>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <!-- https://unpkg.com/element-plus/dist -->
    <script src="./index.full.min.js"></script>
    <script>
      const { createApp, nextTick, reactive, ref } = Vue;
      const apiBase =
        new URLSearchParams(window.location.search).get('api') ||
        (window.location.protocol === 'file:' ? 'http://localhost:3100/api/users' : '/api/users');

      createApp({
        setup() {
          const users = ref([]);
          const keyword = ref('');
          const loading = ref(false);
          const saving = ref(false);
          const dialogVisible = ref(false);
          const editingId = ref(null);
          const lastMessage = ref('');
          const formRef = ref(null);
          const form = reactive({
            username: '',
            email: '',
            age: 18,
            status: 1,
          });

          const rules = {
            username: [{ required: true, message: '请输入用户名', trigger: 'blur' }],
            email: [
              { required: true, message: '请输入邮箱', trigger: 'blur' },
              { type: 'email', message: '邮箱格式不正确', trigger: 'blur' },
            ],
            age: [{ required: true, message: '请输入年龄', trigger: 'change' }],
            status: [{ required: true, message: '请选择状态', trigger: 'change' }],
          };

          async function fetchUsers() {
            loading.value = true;
            lastMessage.value = '';

            try {
              const response = await axios.get(apiBase, {
                params: keyword.value.trim() ? { q: keyword.value.trim() } : {},
              });
              users.value = response.data;
            } catch (error) {
              console.error('加载用户失败', error);
              ElementPlus.ElMessage.error(getErrorMessage(error));
            } finally {
              loading.value = false;
            }
          }

          function openCreateDialog() {
            resetForm();
            dialogVisible.value = true;
            clearValidate();
          }

          function openEditDialog(user) {
            editingId.value = user.id;
            form.username = user.username;
            form.email = user.email;
            form.age = user.age;
            form.status = user.status;
            dialogVisible.value = true;
            clearValidate();
          }

          async function submitUser() {
            if (!formRef.value) {
              return;
            }

            await formRef.value.validate(async (valid) => {
              if (!valid) {
                return;
              }

              saving.value = true;

              try {
                const payload = {
                  username: form.username.trim(),
                  email: form.email.trim(),
                  age: form.age,
                  status: form.status,
                };

                if (editingId.value) {
                  await axios.put(`${apiBase}/${editingId.value}`, payload);
                  lastMessage.value = '用户已更新';
                  ElementPlus.ElMessage.success('用户已更新');
                } else {
                  await axios.post(apiBase, payload);
                  lastMessage.value = '用户已新增';
                  ElementPlus.ElMessage.success('用户已新增');
                }

                closeDialog();
                await fetchUsers();
              } catch (error) {
                console.error('保存用户失败', error);
                ElementPlus.ElMessage.error(getErrorMessage(error));
              } finally {
                saving.value = false;
              }
            });
          }

          async function deleteUser(user) {
            try {
              await ElementPlus.ElMessageBox.confirm(
                `确认删除 ${user.username || user.email}？`,
                '删除确认',
                {
                  confirmButtonText: '删除',
                  cancelButtonText: '取消',
                  type: 'warning',
                },
              );
            } catch {
              return;
            }

            try {
              await axios.delete(`${apiBase}/${user.id}`);
              await fetchUsers();
              lastMessage.value = '用户已删除';
              ElementPlus.ElMessage.success('用户已删除');
            } catch (error) {
              console.error('删除用户失败', error);
              ElementPlus.ElMessage.error(getErrorMessage(error));
            }
          }

          function clearSearch() {
            keyword.value = '';
            fetchUsers();
          }

          function closeDialog() {
            dialogVisible.value = false;
            resetForm();
          }

          function resetForm() {
            editingId.value = null;
            form.username = '';
            form.email = '';
            form.age = 18;
            form.status = 1;
          }

          function clearValidate() {
            nextTick(() => formRef.value && formRef.value.clearValidate());
          }

          function formatDate(value) {
            if (!value) {
              return '-';
            }

            return new Intl.DateTimeFormat('zh-CN', {
              year: 'numeric',
              month: '2-digit',
              day: '2-digit',
              hour: '2-digit',
              minute: '2-digit',
            }).format(new Date(value));
          }

          function getErrorMessage(error) {
            return error.response?.data?.message || error.message || '请求失败';
          }

          fetchUsers();

          return {
            users,
            keyword,
            loading,
            saving,
            dialogVisible,
            editingId,
            lastMessage,
            formRef,
            form,
            rules,
            fetchUsers,
            openCreateDialog,
            openEditDialog,
            submitUser,
            deleteUser,
            clearSearch,
            closeDialog,
            formatDate,
          };
        },
      }).use(ElementPlus).mount('#app');
    </script>
  </body>
</html>
