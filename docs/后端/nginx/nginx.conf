http {
    # 全局 HTTP 配置
    # 1. 配置缓存目录和缓存区域
    #    cache: 存放缓存文件的目录
    #    levels=1:2: 缓存目录层级，便于文件管理
    #    keys_zone=my_cache:10m: 定义共享内存缓存区域，名为 my_cache，大小 10MB
    proxy_cache_path cache levels=1:2 keys_zone=my_cache:10m;

    # 2. 开启 gzip 压缩，减少传输体积
    #    仅对常见文本类资源启用压缩，提升页面加载速度
    gzip on;
    gzip_types text/plain application/x-javascript application/javascript text/css application/xml text/javascript application/x-httpd-php image/jpeg image/gif image/png;

    # 3. 默认 HTTP 服务：将所有 HTTP 请求重定向到 HTTPS
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name localhost;

        # 301/302 都可以，根据业务需求选择
        # 这里使用 302，便于开发调试时明确看到跳转过程
        return 302 https://$host$request_uri;
    }

    # 4. HTTPS 服务配置
    server {
        listen 443 ssl http2;
        server_name localhost;

        # 启用 HTTP/2 服务器推送预加载（可选）
        http2_push_preload on;

        # 允许跨域访问，适合开发环境调试
        # 生产环境建议改成具体域名，避免过度放开
        add_header Access-Control-Allow-Origin *;

        # HTTPS 证书配置
        # 注意：证书文件路径相对于 nginx 配置文件所在目录
        ssl_certificate_key ./localhost-privkey.pem;
        ssl_certificate ./localhost-cert.pem;

        # 5. 反向代理配置
        location / {
            # 处理 OPTIONS 预检请求，避免浏览器因 CORS 被拦截
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin *;
                add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS";
                add_header Access-Control-Allow-Headers "Authorization,Content-Type";
                return 204;
            }

            # 启用缓存
            proxy_cache my_cache;

            # 转发到后端服务
            proxy_pass http://127.0.0.1:8888;

            # 保留客户端请求头信息，便于后端识别真实访问者
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}